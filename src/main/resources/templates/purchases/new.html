<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>New Purchase</title>
</head>
<body>

  <div class="container">

    <h1>新增購買紀錄</h1>
    
    <form th:action="@{/purchases}"
          th:object="${purchase}"
          method="post">
    
      <div class="form-group">
        <label>日期</label>
        <input type="month" th:field="*{purchaseDate}">
      </div>
    
      <div class="form-group">
        <label>名稱</label>
        <input type="text" th:field="*{itemName}">
      </div>
    
      <div class="form-group">
        <label>作品</label>
        <input type="text" th:field="*{workTitle}">
      </div>
    
      <div class="form-group">
        <label>金額</label>
        <input type="number" step="0.01" th:field="*{totalPrice}">
      </div>
    
      <div class="form-group">
        <label>付款來源</label>
        <select th:field="*{paymentSource}">
          <option value="father">父</option>
          <option value="mother">母</option>
          <option value="self">自己</option>
        </select>
      </div>

      <button type="submit">儲存</button>
    </form>

    <a href="/purchases/view">返回列表</a>
  </div>
</body>
</html>
