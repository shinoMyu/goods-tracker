<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>Purchase List</title>
</head>

<body>
  <div class="header">
    <h1>グッズ購買紀錄</h1>
    <div class="actions">
      <a href="/purchases/new" class="btn-add">新增購買</a>
      <div id="menu" class="menu">
        <button id="moreBtn" class="btn-more">⋯</button>
        <div class="dropdown hidden">
          <button id="mergeModeBtn">合併出貨</button>
        </div>
      </div>
    </div>
  </div>
  <div id="mergeBar" class="merge-bar hidden">
    <span id="mergeCount">已選 0 筆</span>
    <button id="clearMergeBtn">重設</button>
    <button id="confirmMergeBtn">確認合併</button>
    <button id="exitMergeBtn">取消</button>
  </div>
  
  <table>
    <thead>
      <tr>
        <th class="id-col">#</th>
        <th class="work-color-col" title="作品">■</th>
        <th>日期</th>
        <th>名稱</th>
        <th>金額</th>
        <th></th>
        <th>郵費</th>
        <th>狀態</th>
        <th class="category-col">種類</th>
      </tr>
    </thead>

    <tbody>
      <tr th:each="p, pStat : ${purchases}" 
          th:attr="data-id=${p.id},data-price=${p.totalPrice}">
            <!-- data-shipping=${p.order?.shippingFee},data-extra=${p.extra}"> -->
        <td class="id-col" th:text="${p.id}"></td>
        <td class="work-color tooltip" th:data-work-id="${p.work.id}" th:data-color="${p.work.color}"
          th:data-received="${p.received}" th:data-work="${p.work.title}"></td>
        <td class="date-col tooltip" th:text="${pStat.index == 0 or purchases[pStat.index-1].purchaseDate != p.purchaseDate 
                      ? #temporals.format(p.purchaseDate,'yyyy-MM') 
                      : ''}" th:attr="data-date=${#temporals.format(p.purchaseDate,'yyyy-MM')}">
        </td>
        <td th:text="${p.itemName}"></td>
        <td class="amount" th:attr="data-id=${p.id},data-price=${p.totalPrice.stripTrailingZeros().toPlainString()},
          data-source=${p.paymentSource},data-type=${p.purchaseType}"
          th:text="${p.totalPrice.stripTrailingZeros().toPlainString()}"></td>
        <td></td>
        <td class="shipping" 
            th:attr="data-order=${p.order?.id},
                    data-order-count=${p.order != null ? orderCountMap[p.order.id] : 0}
            "><span th:text="${p.order?.shippingFee != null 
              ? p.order.shippingFee.stripTrailingZeros().toPlainString() : ''}"></span></td>
        <td class="status tooltip"
            th:attr="data-order=${p.order?.id}, data-received=${p.received},
              data-shipping=${p.order?.shippingFee}, data-color=${p.order?.color}"
              ><span class="shippingMark" th:if="${p.received}">✓</span></td>
        <td class="category-col" th:text="${p.category}"></td>
      </tr>

    <tr th:if="${#lists.isEmpty(purchases)}">
      <td colspan="9" class="empty-state">
        <div class="empty-text">尚無購買紀錄</div>
        <div class="empty-tip">請點擊「新增購買」</div>
      </td>
    </tr>
    </tbody>

    <tfoot>
      <tr th:if="${not #lists.isEmpty(purchases)}">
        <td colspan="7"></td>
        <td id="total-amount">總計：</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <script th:src="@{/js/menu.js}" defer></script>
  <script th:src="@{/js/mergeMode.js}" defer></script>
  <script th:src="@{/js/ui-utils.js}" defer></script>
  <script th:src="@{/js/workColor.js}" defer></script>
  <script th:src="@{/js/paymentPopover.js}" defer></script>
  <!-- <script th:src="@{/js/shippingMark.js}" defer></script> -->
  <script th:src="@{/js/shippingEdit.js}" defer></script>
  <script th:src="@{/js/status.js}" defer></script>
</body>
</html>
