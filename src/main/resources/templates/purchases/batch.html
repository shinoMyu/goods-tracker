<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/form.css}">
  <link rel="stylesheet" th:href="@{/css/batch.css}">
  <title>New Purchase</title>
</head>

<body>
  <div class="container batch">
    <h1>新增購買紀錄</h1>

    <form th:action="@{/purchases/batch}" th:object="${basePurchase}" method="post">

      <div class="section">
        <h3>共通設定</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>日期</label>
            <input type="month" name="purchaseMonth" th:value="${#temporals.format(basePurchase.purchaseDate, 'yyyy-MM')}"
              th:min="${#temporals.format(minDate, 'yyyy-MM')}" required>
          </div>

          <div class="form-group">
            <label>付款來源</label>
            <select th:field="*{paymentSource}">
              <option value="father">父</option>
              <option value="mother">母</option>
              <option value="self">自己</option>
            </select>
          </div>

          <div class="form-group">
            <label>類型</label>
            <select th:field="*{purchaseType}">
              <option value="official">公式</option>
              <option value="secondhand">中古</option>
            </select>
          </div>

          <div class="form-group">
            <label>到貨狀態</label>
            <select th:field="*{received}">
              <option value="false">未到貨</option>
              <option value="true">已到貨</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="section">
        <h3>購入内容</h3>
        <div id="items"></div>

        <div id="template" class="item-row" style="display:none">
          <div class="item-index"></div>
          <p class="form-error" th:if="${error}" th:text="${error}"></p>
          <div class="form-group">
            <label>作品</label>
            <input list="works" data-field="workTitle" placeholder="輸入或選擇作品" required>
            <datalist id="works">
              <option th:each="w : ${works}" th:value="${w.title}"></option>
            </datalist>
          </div>

          <div class="form-group">
            <label>種類</label>
            <input list="categories" data-field="category" placeholder="輸入或選擇種類" required>
            <datalist id="categories">
              <option th:each="c : ${categories}" th:value="${c}"></option>
            </datalist>
          </div>

          <div class="form-group">
            <label>名稱</label>
            <input type="text" data-field="itemName" required>
          </div>

          <div class="form-group">
            <label>金額</label>
            <input type="number" step="0.01" min="0" class="amountInput" data-field="totalPrice">
            <div class="installmentBox" style="display:none">
              <input type="number" step="0.01" min="0" class="depositInput" data-field="deposit" placeholder="訂金">
              <input type="number" step="0.01" min="0" class="balanceInput" data-field="balance" placeholder="尾款">
              <div class="total">總金額：<span class="totalPreview">0</span></div>
            </div>
            <div class="paymentOptions" style="display:none">
              <label><input type="radio" data-field="payMode" value="single" checked>一次付款</label>
              <label><input type="radio" data-field="payMode" value="deposit">只有訂金</label>
              <label><input type="radio" data-field="payMode" value="installment">分期</label>
            </div>
            <button type="button" class="remove-btn">刪除</button>
          </div>
        </div>
        <button type="button" id="addRow" class="add-btn">＋</button>
      </div>
      <button type="submit">儲存</button>
    </form>

    <div class="form-footer">
      <a href="/purchases/view">返回列表</a>
      <a href="/purchases/new">單筆新增</a>
    </div>
  </div>
  <script th:src="@{/js/paymentRow.js}" defer></script>
  <script th:src="@{/js/batch.js}" defer></script>
</body>

</html>
